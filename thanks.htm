 @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
   
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 40%, #d1fae5 70%, #a7f3d0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Montserrat", sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Animated background particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      animation: floatUp linear infinite;
      opacity: 0;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }

      10% {
        opacity: 0.4;
      }

      90% {
        opacity: 0.2;
      }

      100% {
        transform: translateY(-10vh) scale(1.2);
        opacity: 0;
      }
    }

    /* Glowing rings */
    .rings {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(37, 211, 102, 0.25);
      animation: expand 4s ease-out infinite;
    }

    .ring:nth-child(2) {
      animation-delay: 1.3s;
    }

    .ring:nth-child(3) {
      animation-delay: 2.6s;
    }

    @keyframes expand {
      0% {
        width: 80px;
        height: 80px;
        opacity: 0.8;
      }

      100% {
        width: 600px;
        height: 600px;
        opacity: 0;
      }
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 10;
      background: #ffffff;
      border: 1px solid rgba(37, 211, 102, 0.2);
      border-radius: 28px;
      padding: 56px 48px 48px;
      text-align: center;
      max-width: 460px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(37, 211, 102, 0.15), 0 4px 16px rgba(0, 0, 0, 0.06);
      animation: cardIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.92);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Checkmark icon */
    .check-wrap {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #25D366, #128C7E);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      animation: checkPop 0.6s 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      box-shadow: 0 0 40px rgba(37, 211, 102, 0.35);
    }

    @keyframes checkPop {
      from {
        transform: scale(0) rotate(-180deg);
        opacity: 0;
      }

      to {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    .check-wrap svg {
      width: 38px;
      height: 38px;
    }

    /* Headline */
    h1 {

      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.5px;
      margin-bottom: 10px;

    .subtitle {

      animation: fadeUp 0.6s 0.7s ease both;

    @keyframes fadeUp {

        transform: translateY(16px);
      }

      to {

        transform: translateY(0);
      }
    }

    /* WhatsApp message preview */
    .message-preview {

      border: 1px solid rgba(37, 211, 102, 0.3);
      border-radius: 16px;
      padding: 16px 20px;
      margin-bottom: 32px;
      text-align: left;
      animation: fadeUp 0.6s 0.8s ease both;
    }

    .mp-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #16a34a;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .mp-text {
      font-size: 14px;
      color: #374151;
      line-height: 1.5;
      font-style: italic;
    }

    /* Progress bar */
    .progress-wrap {
      animation: fadeUp 0.6s 0.9s ease both;
    }

    .progress-label {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .dot-pulse {
      display: flex;
      gap: 4px;
    }

    .dot-pulse span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #25D366;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .dot-pulse span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot-pulse span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(0.6);
        opacity: 0.3;
      }

      50% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .progress-bar-bg {
      height: 6px;
      background: #e2e8f0;
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #25D366, #128C7E);
      border-radius: 99px;
      width: 0%;
      animation: fillBar 6s 1s linear forwards;
      box-shadow: 0 0 12px rgba(37, 211, 102, 0.4);
    }

    @keyframes fillBar {
      from {
        width: 0%;
      }

      to {
        width: 100%;
      }
    }

    .countdown {
      font-size: 22px;
      font-weight: 700;
      color: #16a34a;
      margin-bottom: 4px;
    }

    .countdown-sub {

    /* Manual button */

    .btn:hover {

    }

    .btn:active {

    .btn svg {

  </style>

  <script>
    // ── CONFIG ──────────────────────────────────────────────────────────
    const PHONE = "919373761137";
    const DELAY = 7;
    // ───────────────────────────────────────────────────────────────────

    const params = new URLSearchParams(window.location.search);
    const userName = params.get("qSenderName") || "";

    const MESSAGE = "Hello, Looking for Godrej Hinjewadi Phase 1 Projects At Pune. Get in touch with me my name is   " + userName.toUpperCase();

    const url = "https://wa.me/" + PHONE + "?text=" + encodeURIComponent(MESSAGE);
    document.getElementById("waBtn").href = url;
    document.getElementById("msgPreview").textContent = '"' + MESSAGE + '"';

    // ✅ Personalized heading
    const heading = document.getElementById("thankYouHeading");
    if (userName) {
      heading.textContent = 'Thank you for contacting us, ' + userName.charAt(0).toUpperCase() + userName.slice(1).toLowerCase() + '! 🎉';
    } else {
      heading.textContent = 'Thank you! 🎉';
    }

    // Countdown
    let t = DELAY;
    const el = document.getElementById("countdown");
    const tick = setInterval(() => {
      t--;
      el.textContent = t;
      if (t <= 0) { clearInterval(tick); window.location.href = url; }
    }, 1000);

    // Particles
    const container = document.getElementById("particles");
    const colors = ["#25D366", "#128C7E", "#bbf7d0", "#86efac", "#34d399"];
    for (let i = 0; i < 28; i++) {
      const p = document.createElement("div");
      p.className = "particle";
      const size = Math.random() * 6 + 3;
      p.style.cssText = [
        "width:" + size + "px",
        "height:" + size + "px",
        "left:" + Math.random() * 100 + "%",
        "background:" + colors[Math.floor(Math.random() * colors.length)],
        "animation-duration:" + (Math.random() * 8 + 6) + "s",
        "animation-delay:" + (Math.random() * 8) + "s"
      ].join(";");
      container.appendChild(p);
    }
  </script>
